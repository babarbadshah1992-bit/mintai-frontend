<!DOCTYPE html>
<html>
<head>
  <title>MintAI Auto Blog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 style="text-align:center;margin-top:30px;">MintAI Health Blog 🌿</h1>

<div style="text-align:center;margin:20px;">
  <input type="text" id="blogTopic" placeholder="Enter topic like hair fall, skin care" style="padding:10px;width:250px;">
  <button onclick="generateBlog()" style="padding:10px 15px;">Generate Blog</button>
</div>

<div id="blogContent" style="max-width:800px;margin:40px auto;padding:20px;background:#fff;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,0.1);"></div>

<script>
const API_URL = "https://mintai-backend.vercel.app/api/chat";

async function generateBlog(){
  const topic = document.getElementById("blogTopic").value;
  const blogDiv = document.getElementById("blogContent");

  if(topic==="") return;

  blogDiv.innerHTML = "Generating blog... ⏳";

  const res = await fetch(API_URL,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      message:`Write a detailed SEO blog on ${topic}. Include headings, tips and conclusion.`
    })
  });

  const data = await res.json();

  blogDiv.innerHTML = `
    <h2>${topic.toUpperCase()}</h2>
    <p>${data.reply.replace(/\n/g,"<br>")}</p>
  `;
}
</script>

</body>
</html>
