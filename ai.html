<link rel="stylesheet" href="./style.css">
</head>

<body>
<!-- SPLASH SCREEN -->
<div id="splash">
  <h1 class="logo-animate">
    <span>M</span><span>i</span><span>n</span><span>t</span><span>A</span><span>I</span>
  </h1>
</div>
<header>

  <div class="logo">Mint<span>AI</span></div>

  <!-- ☰ Hamburger -->
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>

  <!-- Navigation -->
  <nav class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="ai.html">AI Assistant</a>
      <a href="store.html">Store</a>
      <a href="pricing.html">Pricing</a>

<!-- NAVBAR -->
<nav>
  <h2>🌿 MintAI</h2>
  <div>
    <a href="index.html">Home</a>
    <a href="store.html">Store</a>
    <a href="pricing.html">Pricing</a>
    <a href="ai.html">AI Assistant</a>
    <a href="report-scan.html">Report Scan</a>

</nav>

<!-- CHAT CONTAINER -->
<div class="chat-wrapper">

    <div id="chatBox" class="chat-box"></div>

    <div class="typing" id="typing" style="display:none;">
        <span></span><span></span><span></span>
    </div>

    <div class="chat-input">
        <input id="userInput" type="text" placeholder="Ask about skin, hair, weight loss">
        <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>

</div>
  
<script src="script.js"></script>

<script>
window.onload = () => {
  setTimeout(() => {
    document.getElementById("splash").style.opacity = "0";
    setTimeout(()=>{
      document.getElementById("splash").style.display = "none";
    },500);
  },2000);
}
</script>
